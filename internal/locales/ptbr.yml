  <i>⏰ Duração: {duration}</i>
voicechat_started: |-
  <b>♻️ Bate-papo por voz iniciado!</b>

  <i>Use /play [nome da música] para tocar música.</i>
help_owner: |-
  👑 <b>Comandos do proprietário</b>

  <i>Ferramentas exclusivas para gerenciar usuários sudo, executar código do sistema e administrar o bot com segurança.</i>

  <b>Comandos:</b>
  <blockquote>
  <b>/addsudo</b> - Adiciona um novo usuário à lista sudo do bot
  <b>/delsudo</b> - Remove um usuário da lista sudo do bot
  <b>/eval</b> - Executa trechos de código Go
  <b>/maintenance</b> - Gerencia o modo de manutenção do bot
  <b>/restart</b> - Reinicia o bot
  <b>/sh</b> - Executa comandos shell
  </blockquote>
help_sudo: |-
  ⚡ <b>Comandos sudo</b>

  <i>Ferramentas avançadas para gerenciar o comportamento do bot, monitorar desempenho e controlar logs e automações.</i>

  <b>Comandos:</b>
  <blockquote>
  <b>/active</b> - Mostra o total de chats ativos
  <b>/autoleave</b> - Alterna a saída automática do chat
  <b>/logger</b> - Ativa ou desativa o logger
  <b>/stats</b> - Exibe as estatísticas do bot e do sistema
  <b>/logs</b> - Obtém os logs do sistema
  </blockquote>
help_admin: |-
  🛠 <b>Comandos de administrador</b>

  <i>Ferramentas de controle de música e reprodução para administradores gerenciarem a fila com facilidade.</i>

  <b>Comandos:</b>
  <blockquote>
  <b>/playmode</b> - Controla quem pode usar /play
  <b>/cmddelete</b> - Alterna a exclusão automática de comandos do bot
  <b>/speed</b> - Altera a velocidade de reprodução
  <b>/skip</b> - Pula a música atual
  <b>/pause</b> - Pausa a reprodução atual
  <b>/resume</b> - Retoma a reprodução pausada
  <b>/replay</b> - Repete a música atual
  <b>/mute</b> - Silencia a reprodução
  <b>/unmute</b> - Reativa o som da reprodução
  <b>/seek</b> - Avança alguns segundos
  <b>/seekback</b> - Retrocede alguns segundos
  <b>/jump</b> - Pula para um ponto específico da faixa
  <b>/move</b> - Move uma faixa da fila para outra posição
  <b>/clear</b> - Limpa todas as músicas da fila
  <b>/remove</b> - Remove uma faixa específica da fila
  <b>/shuffle</b> - Embaralha todas as faixas da fila
  <b>/loop</b> - Ativa ou desativa o loop
  <b>/stop</b> - Para a reprodução e sai do chat de voz
  <b>/nothumb</b> - Ativa ou desativa capa/miniatura nas mensagens de reprodução
  </blockquote>
help_public: |-
  🌍 <b>Comandos públicos</b>

  <i>Recursos para tocar músicas, ver a fila, verificar a latência e reportar bugs.</i>

  <b>Comandos:</b>
  <blockquote>
  <b>/play</b> - Toca uma música
  <b>/queue</b> - Mostra todas as faixas na fila
  <b>/ping</b> - Verifica a latência de rede do bot
  <b>/start</b> - Inicia o bot
  <b>/help</b> - Mostra o menu de ajuda
  <b>/bug</b> - Reporta um problema
  <b>/position</b> - Mostra o tempo atual da faixa
  <b>/reload</b> - Recarrega dados de administrador e cache
  <b>/json</b> - Mostra a estrutura JSON da mensagem
  <b>/sudolist</b> - Mostra a lista de usuários sudo
  </blockquote>
