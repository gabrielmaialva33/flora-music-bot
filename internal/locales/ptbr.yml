rtmp_dm_only: |-
  🔒 <b>Aviso de segurança</b>

  As credenciais RTMP NUNCA devem ser compartilhadas em grupos!

  <b>📩 Para configurar RTMP:</b>
  1. Abra meu chat privado: @{bot_username}
  2. Envie: <code>{cmd} &lt;chat_id&gt; &lt;rtmp_url&gt;</code>

  <b>💡 Exemplo:</b>
  <code>/setrtmp -1001234567890 rtmps://server/s/key</code>
rtmp_setup_usage: |-
  ⚙️ Configuração <b>RTMP</b>

  <u>Uso:</u>
  <code>/setrtmp &lt;chat_id&gt; &lt;full_rtmp_url&gt;</code>

  <b>📋 Parâmetros:</b>
  • <code>chat_id</code> - ID do chat/canal alvo
  • <code>full_rtmp_url</code> - URL RTMP completa com a chave de transmissão

  <b>📝 Exemplo:</b>
  <code>/setrtmp -1001234567890 rtmps://dc5-1.rtmp.t.me/s/123:key</code>

  <b>🔍 Como obter o ID do chat:</b>
  • Encaminhe qualquer mensagem do chat para @userinfobot
  • Ou use o comando <code>/id</code> no chat

  <b>🔐 Segurança:</b>
  • A configuração só funciona no privado (DM)
  • Você deve ser administrador no chat de destino
  • As credenciais são armazenadas com segurança
rtmp_invalid_chat_id: |-
  ❌ <b>ID de bate-papo inválido!</b>

